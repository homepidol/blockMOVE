<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블럭이동 공지 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root {
–navy: #002a6e;
–blue: #0057c2;
–red: #c0392b;
–green: #1a7a4a;
–yellow: #f39c12;
–bg: #eef1f6;
–card: #fff;
–border: #dde2ea;
–text: #1a1a2e;
–muted: #7a8599;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Noto Sans KR’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
}

/* ── APP SHELL ── */
.app-header {
background: linear-gradient(135deg, var(–navy) 0%, var(–blue) 100%);
padding: 18px 32px;
display: flex;
align-items: center;
justify-content: space-between;
box-shadow: 0 2px 12px rgba(0,42,110,0.3);
position: sticky;
top: 0;
z-index: 100;
}
.app-header .logo {
color: #fff;
font-size: 16px;
font-weight: 900;
letter-spacing: -0.3px;
}
.app-header .logo span { color: #7ec8ff; }
.app-header .subtitle { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 2px; }

.tab-bar {
display: flex;
background: var(–navy);
padding: 0 32px;
border-bottom: 1px solid rgba(255,255,255,0.1);
}
.tab-btn {
padding: 10px 20px;
color: rgba(255,255,255,0.55);
font-size: 13px;
font-weight: 600;
cursor: pointer;
border: none;
background: none;
border-bottom: 3px solid transparent;
transition: all 0.2s;
font-family: inherit;
}
.tab-btn.active {
color: #fff;
border-bottom-color: #7ec8ff;
}

.layout {
display: grid;
grid-template-columns: 420px 1fr;
gap: 0;
min-height: calc(100vh - 95px);
}

/* ── 입력 패널 ── */
.input-panel {
background: var(–card);
border-right: 1px solid var(–border);
overflow-y: auto;
height: calc(100vh - 95px);
position: sticky;
top: 95px;
}

.panel-section {
padding: 20px 24px;
border-bottom: 1px solid var(–border);
}
.panel-section:last-child { border-bottom: none; }

.section-label {
font-size: 10px;
font-weight: 800;
color: var(–muted);
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 14px;
display: flex;
align-items: center;
gap: 6px;
}
.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

.form-row { margin-bottom: 12px; }
.form-row label {
display: block;
font-size: 11px;
font-weight: 700;
color: var(–muted);
margin-bottom: 4px;
}
.form-row input, .form-row select, .form-row textarea {
width: 100%;
padding: 9px 12px;
border: 1.5px solid var(–border);
border-radius: 8px;
font-size: 13px;
font-family: inherit;
color: var(–text);
background: #fafbfd;
transition: border-color 0.2s, box-shadow 0.2s;
outline: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
border-color: var(–blue);
box-shadow: 0 0 0 3px rgba(0,87,194,0.1);
background: #fff;
}
.form-row textarea { resize: vertical; min-height: 60px; }

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

/* 일정 행 */
.schedule-rows { display: flex; flex-direction: column; gap: 8px; }
.schedule-row {
background: #f7f9fc;
border: 1px solid var(–border);
border-radius: 8px;
padding: 10px 12px;
position: relative;
}
.schedule-row-grid {
display: grid;
grid-template-columns: 1fr 1.5fr 1fr auto;
gap: 6px;
align-items: end;
}
.schedule-row input, .schedule-row select {
padding: 7px 8px;
border: 1.5px solid var(–border);
border-radius: 6px;
font-size: 12px;
font-family: inherit;
background: #fff;
outline: none;
width: 100%;
}
.schedule-row input:focus, .schedule-row select:focus {
border-color: var(–blue);
}
.schedule-row .row-label {
font-size: 10px;
color: var(–muted);
font-weight: 600;
margin-bottom: 3px;
}
.del-btn {
background: #fff0f0;
border: 1px solid #ffcccc;
border-radius: 6px;
color: var(–red);
font-size: 14px;
cursor: pointer;
width: 30px;
height: 30px;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: background 0.15s;
}
.del-btn:hover { background: #ffe0e0; }

.add-row-btn {
background: #f0f6ff;
border: 1.5px dashed #b3c8fa;
border-radius: 8px;
color: var(–blue);
font-size: 12px;
font-weight: 700;
padding: 8px;
cursor: pointer;
width: 100%;
font-family: inherit;
transition: background 0.15s;
}
.add-row-btn:hover { background: #e0edff; }

/* 요청사항 */
.action-rows { display: flex; flex-direction: column; gap: 6px; }
.action-item {
display: flex;
gap: 6px;
align-items: center;
}
.action-item input {
flex: 1;
padding: 8px 10px;
border: 1.5px solid var(–border);
border-radius: 6px;
font-size: 12px;
font-family: inherit;
outline: none;
background: #fafbfd;
}
.action-item input:focus { border-color: var(–blue); }

/* 버튼 */
.btn-primary {
background: linear-gradient(135deg, var(–navy), var(–blue));
color: #fff;
border: none;
border-radius: 10px;
padding: 13px 24px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
width: 100%;
font-family: inherit;
transition: opacity 0.2s, transform 0.1s;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}
.btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
background: #fff;
color: var(–blue);
border: 1.5px solid var(–blue);
border-radius: 10px;
padding: 11px 24px;
font-size: 13px;
font-weight: 700;
cursor: pointer;
font-family: inherit;
transition: background 0.15s;
}
.btn-secondary:hover { background: #f0f6ff; }

.btn-row {
display: flex;
gap: 8px;
padding: 16px 24px;
background: var(–card);
border-top: 1px solid var(–border);
position: sticky;
bottom: 0;
}

/* ── 미리보기 패널 ── */
.preview-panel {
background: #e8ecf3;
overflow-y: auto;
padding: 32px;
}

.preview-toolbar {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 20px;
}
.preview-toolbar .pt-title {
font-size: 13px;
font-weight: 700;
color: var(–muted);
}
.copy-btn {
background: var(–navy);
color: #fff;
border: none;
border-radius: 8px;
padding: 8px 16px;
font-size: 12px;
font-weight: 700;
cursor: pointer;
font-family: inherit;
display: flex;
align-items: center;
gap: 6px;
transition: opacity 0.2s;
}
.copy-btn:hover { opacity: 0.85; }
.copy-btn.copied { background: var(–green); }

/* ── 이메일 미리보기 ── */
#email-preview {
max-width: 660px;
margin: 0 auto;
background: #fff;
border-radius: 14px;
overflow: hidden;
box-shadow: 0 6px 32px rgba(0,42,110,0.14);
}

.ep-header {
background: linear-gradient(135deg, #003087 0%, #0057c2 100%);
padding: 28px 32px;
position: relative;
overflow: hidden;
}
.ep-header::before {
content: ‘’;
position: absolute;
top: -50px; right: -50px;
width: 200px; height: 200px;
border-radius: 50%;
background: rgba(255,255,255,0.05);
}
.ep-tag {
display: inline-block;
background: #ff4444;
color: #fff;
font-size: 10px;
font-weight: 800;
letter-spacing: 1px;
padding: 3px 10px;
border-radius: 4px;
margin-bottom: 10px;
}
.ep-header h1 {
color: #fff;
font-size: 20px;
font-weight: 900;
line-height: 1.35;
}
.ep-header h1 span { color: #7ec8ff; }
.ep-header-sub {
color: rgba(255,255,255,0.65);
font-size: 12px;
margin-top: 6px;
}

.ep-urgent {
background: #fff3cd;
border-left: 5px solid #ffc107;
padding: 12px 22px;
display: flex;
align-items: center;
gap: 10px;
font-size: 13px;
font-weight: 700;
color: #7a5700;
}
.ep-urgent span { color: #c0392b; }

.ep-section {
padding: 20px 28px;
border-bottom: 1px solid #eef0f3;
}
.ep-section-title {
font-size: 10px;
font-weight: 800;
color: #999;
letter-spacing: 1.2px;
text-transform: uppercase;
margin-bottom: 12px;
}

.ep-info-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}
.ep-info-card {
background: #f7f9fc;
border-radius: 8px;
padding: 13px 15px;
border: 1px solid #e4e8ee;
}
.ep-info-card.hl { background: #e8f0fe; border-color: #b3c8fa; }
.ep-info-card label {
font-size: 10px;
color: #999;
font-weight: 700;
display: block;
margin-bottom: 3px;
}
.ep-info-card .val {
font-size: 17px;
font-weight: 900;
color: #003087;
}
.ep-info-card .val.red { color: #c0392b; }

.ep-route {
background: #f7f9fc;
border-radius: 10px;
padding: 18px;
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
border: 1px solid #e4e8ee;
}
.ep-route-node { text-align: center; }
.ep-route-node .nl { font-size: 10px; color: #999; margin-bottom: 3px; }
.ep-route-node .nv { font-size: 26px; font-weight: 900; line-height: 1; }
.ep-route-node.from .nv { color: #c0392b; }
.ep-route-node.to .nv { color: #1a7a4a; }
.ep-arrow { font-size: 26px; font-weight: 900; color: #003087; }
.ep-route-note { font-size: 11px; color: #666; text-align: center; margin-top: 8px; }

.ep-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ep-table th {
background: #003087;
color: #fff;
padding: 9px 11px;
text-align: center;
font-size: 11px;
font-weight: 700;
}
.ep-table td {
padding: 9px 11px;
border-bottom: 1px solid #eef0f3;
text-align: center;
vertical-align: middle;
}
.ep-table tr:last-child td { border-bottom: none; }
.ep-table tr:nth-child(even) td { background: #f7f9fc; }

.badge {
display: inline-block;
padding: 2px 8px;
border-radius: 20px;
font-size: 10px;
font-weight: 700;
}
.badge.done { background: #d4edda; color: #1a7a4a; }
.badge.ing  { background: #fff3cd; color: #7a5700; }
.badge.plan { background: #e8f0fe; color: #003087; }

.ep-actions {
background: #fff5f5;
border: 2px solid #ffcccc;
border-radius: 10px;
padding: 16px;
}
.ep-action-title {
font-size: 13px;
font-weight: 900;
color: #c0392b;
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 5px;
}
.ep-action-list { list-style: none; }
.ep-action-list li {
display: flex;
align-items: flex-start;
gap: 7px;
font-size: 12px;
color: #333;
margin-bottom: 7px;
line-height: 1.5;
}
.ep-action-list li::before {
content: ‘▶’;
color: #c0392b;
font-size: 9px;
margin-top: 4px;
flex-shrink: 0;
}

.ep-deadline {
background: linear-gradient(90deg, #c0392b, #e74c3c);
padding: 13px 28px;
display: flex;
align-items: center;
justify-content: space-between;
}
.ep-deadline .dl-text { color: #fff; font-size: 12px; font-weight: 600; }
.ep-deadline .dl-date { color: #fff; font-size: 18px; font-weight: 900; letter-spacing: 1px; }
.ep-dday {
background: #fff;
color: #c0392b;
font-weight: 900;
font-size: 14px;
padding: 5px 14px;
border-radius: 20px;
white-space: nowrap;
}

.ep-footer {
background: #f7f9fc;
padding: 12px 28px;
text-align: center;
font-size: 10px;
color: #aaa;
}

/* ── 히스토리 탭 ── */
.history-panel {
padding: 24px 32px;
}
.history-empty {
text-align: center;
padding: 80px 20px;
color: var(–muted);
}
.history-empty .icon { font-size: 48px; margin-bottom: 12px; }
.history-empty p { font-size: 14px; }

.history-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 16px;
}
.history-card {
background: var(–card);
border-radius: 12px;
padding: 18px;
border: 1px solid var(–border);
cursor: pointer;
transition: box-shadow 0.2s, transform 0.15s;
position: relative;
}
.history-card:hover {
box-shadow: 0 4px 20px rgba(0,42,110,0.12);
transform: translateY(-2px);
}
.history-card .hc-sn {
font-size: 18px;
font-weight: 900;
color: var(–navy);
margin-bottom: 4px;
}
.history-card .hc-route {
font-size: 12px;
color: var(–red);
font-weight: 700;
margin-bottom: 8px;
}
.history-card .hc-meta {
font-size: 11px;
color: var(–muted);
}
.history-card .hc-del {
position: absolute;
top: 12px;
right: 12px;
background: #fff0f0;
border: none;
border-radius: 6px;
color: var(–red);
font-size: 13px;
cursor: pointer;
width: 26px;
height: 26px;
display: flex;
align-items: center;
justify-content: center;
}

/* ── Toast ── */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(60px);
background: #1a1a2e;
color: #fff;
padding: 10px 20px;
border-radius: 8px;
font-size: 13px;
font-weight: 600;
z-index: 999;
transition: transform 0.3s ease;
white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* responsive */
@media (max-width: 860px) {
.layout { grid-template-columns: 1fr; }
.input-panel { height: auto; position: static; }
.preview-panel { padding: 16px; }
}
</style>

</head>

let scheduleRows = [];

// ── 탭 전환 ──
function switchTab(tab) {
  document.getElementById('tab-editor').style.display = tab === 'editor' ? 'grid' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'editor') || (i === 1 && tab === 'history'));
  });
  if (tab === 'history') renderHistory();
}

// ── D-day 계산 ──
function calcDday(deadlineStr) {
  if (!deadlineStr) return '';
  const parts = deadlineStr.replace(/\./g, '-').split('-');
  if (parts.length < 3) return '';
  const target = new Date(parts[0], parseInt(parts[1]) - 1, parseInt(parts[2]));
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'D-DAY';
  if (diff > 0) return `D-${diff}`;
  return `D+${Math.abs(diff)}`;
}

// ── 상태 뱃지 ──
function badgeHTML(status) {
  const map = { done: ['done', '완료'], ing: ['ing', '진행중'], plan: ['plan', '예정'] };
  const [cls, label] = map[status] || ['plan', '예정'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function esc(str) {
  return (str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
